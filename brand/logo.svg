<svg width="600" height="150" viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    Presage Protocol Typographic Logo
    Minimalist "Fire" Aesthetic - Text Only
  -->
  <defs>
    <linearGradient id="fireGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4500;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Typography -->
  <text x="50%" y="80" font-family="Verdana, sans-serif" font-size="84" font-weight="900" fill="url(#fireGradient)" letter-spacing="6" text-anchor="middle" filter="url(#textGlow)">
    PRESAGE
  </text>
  <text x="50%" y="125" font-family="Verdana, sans-serif" font-size="20" fill="white" letter-spacing="12" text-anchor="middle" opacity="0.9">
    PROTOCOL
  </text>

  <!-- Minimal Decorative Underline -->
  <rect x="150" y="140" width="300" height="1" fill="url(#fireGradient)" opacity="0.5" />
</svg>
